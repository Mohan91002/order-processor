name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Maven verify (JDK 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Show toolchain
        run: |
          java -version
          ./mvnw -v

      - name: Compile
        run: ./mvnw -B -ntp -DskipTests package

      - name: Run tests (uses EmbeddedKafkaBroker — no real broker needed)
        run: ./mvnw -B -ntp verify

      - name: Surface test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: order-processor-jar
          path: target/order-processor.jar
          if-no-files-found: warn
