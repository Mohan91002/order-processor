spring:
  datasource:
    url: jdbc:h2:mem:orderprocessor;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2
  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
