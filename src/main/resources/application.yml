spring:
  application:
    name: order-processor
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 3
    consumer:
      group-id: order-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.learning.orderprocessor.kafka.events,java.util,java.lang"
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual_immediate
      concurrency: 3

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,beans,env,loggers,mappings,caches,threaddump
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    access-token-ttl-minutes: 60
  executor:
    core-pool-size: 8
    max-pool-size: 32
    queue-capacity: 200
    thread-name-prefix: app-async-
  kafka-topics:
    orders-created: orders.created
    orders-enriched: orders.enriched
    notifications: orders.notifications
  external:
    shipping-base-url: https://httpbin.org

logging:
  level:
    com.learning.orderprocessor: DEBUG
    org.springframework.kafka: INFO
