spring:
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    access-token-ttl-minutes: 30
  executor:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 50
    thread-name-prefix: test-async-
  kafka-topics:
    orders-created: orders.created
    orders-enriched: orders.enriched
    notifications: orders.notifications
  external:
    shipping-base-url: https://httpbin.org
